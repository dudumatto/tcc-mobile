name: tcc_mobile
description: TCC mobile app in Flutter.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  go_router: ^13.0.0
  provider: ^6.1.0
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0
  stomp_dart_client: ^1.0.0
  google_fonts: ^6.1.0
  lucide_icons: ^1.0.0
  cached_network_image: ^3.3.0
  fl_chart: ^0.68.0
  flutter_form_builder: ^9.2.0
  intl: ^0.19.0
  timeago: ^3.6.0
  shared_preferences: ^2.2.0
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env

